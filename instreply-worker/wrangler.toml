name = "instreply-worker"
main = "src/index.ts"
compatibility_date = "2023-10-30"

[[d1_databases]]
binding = "DB"
database_name = "instreply-db"
database_id = "YOUR_DATABASE_ID" # Replace with actual ID from wrangler output

[[queues.consumers]]
queue = "instreply-dm-queue"
max_batch_size = 10
max_batch_timeout = 30